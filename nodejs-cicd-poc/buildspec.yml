version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd client
      - npm install
  build:
    commands:
      - npm run build
      - cd ../server
      - npm install

artifacts:
  files:
    - server/**/*
    - client/dist/**/*
    - appspec.yml
    - scripts/**/*
